<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEEP 入場門票</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; margin: 0; padding: 50px 20px; }
        .ticket-box { background: white; max-width: 400px; margin: 0 auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 2px dashed #ccc; }
        h1 { color: #333; margin-bottom: 10px; }
        .seat-display { font-size: 32px; font-weight: bold; color: #1e90ff; background: #e1f0ff; padding: 15px; border-radius: 5px; margin: 15px 0; letter-spacing: 1px; }
        .token-display { font-size: 14px; color: #999; background: #f9f9f9; padding: 5px; border-radius: 5px; margin: 10px 0; word-break: break-all; }
        .status { font-size: 20px; font-weight: bold; padding: 15px; border-radius: 8px; margin-top: 20px; }
        .success { background-color: #d4edda; color: #155724; }
        .already_used { background-color: #fff3cd; color: #856404; }
        .invalid { background-color: #f8d7da; color: #721c24; }
        .loading { background-color: #e2e3e5; color: #383d41; }
    </style>
</head>
<body>

    <div class="ticket-box">
        <h1>DEEP入場門票</h1>
        <p>CTS連線驗證</p>
        <hr>
        
        <p>【 門票編號 】</p>
        <div class="seat-display" id="seatId">CTS驗證中...</div>

        <p style="font-size: 12px; color: #aaa; margin-bottom: 2px;">【 驗證代碼 】</p>
        <div class="token-display" id="ticketToken">CTS讀取中...</div>
        
        <div id="verifyStatus" class="status loading">CTS正在核銷中，請稍候...</div>
    </div>

    <script>
        // ⚠️ 記得替換成你最新部署的 GAS 網址（結尾是 /exec）
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycby2Zf-qCXPxlrpfiD6GC4LcCuueS5YC8-4xyVL7h1NGh5KaPh5I30l2oMn4JkQIiqhYkA/exec";

        function getTicketId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        async function autoVerifyAndCheck() {
            const ticketId = getTicketId();
            const tokenDisplay = document.getElementById('ticketToken');
            const seatDisplay = document.getElementById('seatId');
            const statusDisplay = document.getElementById('verifyStatus');

            if (!ticketId) {
                tokenDisplay.innerText = "未帶代碼";
                seatDisplay.innerText = "❌";
                statusDisplay.className = "status invalid";
                statusDisplay.innerText = "❌無效的門票網址！";
                return;
            }

            tokenDisplay.innerText = ticketId;

            try {
                const response = await fetch(`${GAS_API_URL}?id=${ticketId}`);
                const result = await response.json();

                if (result.status === "success") {
                    seatDisplay.innerText = result.seatId; // 顯示觀眾編號 (例如 AVIP-1)
                    statusDisplay.className = "status success";
                    statusDisplay.innerText = "🟢歡迎入場～";
                } else if (result.status === "already_used") {
                    seatDisplay.innerText = result.seatId; // 顯示觀眾編號
                    statusDisplay.className = "status already_used";
                    statusDisplay.innerText = "🟡不要重用！！";
                } else {
                    seatDisplay.innerText = "???????";
                    statusDisplay.className = "status invalid";
                    statusDisplay.innerText = "❌假飛？";
                }

            } catch (error) {
                console.error(error);
                statusDisplay.className = "status invalid";
                statusDisplay.innerText = "⚠️系統錯誤：CTS無法連線至server";
            }
        }

        autoVerifyAndCheck();
    </script>

</body>
</html>
